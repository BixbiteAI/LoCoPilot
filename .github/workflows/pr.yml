# LoCoPilot PR CI — ubuntu-latest only (no Microsoft 1ES/self-hosted pools).
# Full cross-platform integration tests can be run manually via workflow_call jobs if you add runners.
name: LoCoPilot

on:
  pull_request:
    branches:
      - main
      - 'release/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VSCODE_QUALITY: 'oss'

jobs:
  compile-and-hygiene:
    name: Linux (compile & hygiene)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install build tools
        run: sudo apt-get update -y && sudo apt-get install -y build-essential pkg-config libx11-dev libx11-xcb-dev libxkbfile-dev libnotify-bin libkrb5-dev

      - name: Install dependencies
        run: |
          set -e
          for i in {1..5}; do
            npm ci && break
            if [ $i -eq 5 ]; then
              echo "npm ci failed too many times" >&2
              exit 1
            fi
            echo "npm ci failed, retry $i..."
          done
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck /build scripts
        run: npm run typecheck
        working-directory: build

      - name: Compile & hygiene (PR subset — no full product minify)
        run: |
          npm exec -- npm-run-all2 -lp \
            compile-check-ts-native \
            hygiene \
            eslint \
            valid-layers-check \
            define-class-fields-check \
            vscode-dts-compile-check \
            tsec-compile-check \
            test-build-scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
