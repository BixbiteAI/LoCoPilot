# Upstream vscode workflow: blocked PRs touching build/, package.json, or workflows unless the
# author had write access on microsoft/vscode. LoCoPilot needs those paths; this is kept only for
# manual runs if you want to reintroduce a fork-specific policy later.
name: LoCoPilot / Engineering system policy (manual)

on:
  workflow_dispatch: {}

permissions: {}

jobs:
  main:
    name: Skipped on PR — enable workflow_dispatch only
    runs-on: ubuntu-latest
    steps:
      - run: echo "This workflow does not run on pull_request. See file header comment."
